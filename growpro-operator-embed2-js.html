function hasPromo(type){return activePromos.some(function(p){return p.promo.type===type})}
function getPromo(type){
  for(var i=0;i<activePromos.length;i++){if(activePromos[i].promo.type===type) return activePromos[i]}
  return null;
}



function calcTotals(){
  if(!tier) return{setup:0,mo:0};
  var t=TIERS[tier];
  var setup=t.setup;
  var mo=t.monthly;
  if(hasPromo('setup_free')) setup=500; // $500 minimum on full waiver
  var sp=getPromo('setup_discount');
  if(sp) setup=Math.max(500,Math.round(setup*(1-sp.promo.pct/100)));
  if(hasPromo('month_free')){/* first month free handled at Stripe level */}
  var mp=getPromo('monthly_discount');
  if(mp) mo=Math.round(mo*(1-mp.promo.pct/100));
  var fp=getPromo('monthly_flat');
  if(fp) mo=Math.max(0,mo-fp.promo.amount);
  return{setup:setup,mo:mo};
}

function _applyPromoCore(inputId,msgId){
  var code=document.getElementById(inputId).value.trim().toUpperCase();
  var msg=document.getElementById(msgId);
  if(!code){msg.style.color='#E53935';msg.textContent='Enter a code';return}
  var promo=PROMO_CODES[code];
  if(!promo){msg.style.color='#E53935';msg.textContent='Invalid code';return}
  if(activePromos.some(function(p){return p.code===code})){msg.style.color='#E53935';msg.textContent='Code already applied';return}
  if((promo.type==='setup_discount'||promo.type==='setup_free')&&(hasPromo('setup_discount')||hasPromo('setup_free'))){
    msg.style.color='#E53935';msg.textContent='Only one setup discount allowed';return;
  }
  if(promo.type==='monthly_discount'&&hasPromo('monthly_discount')){
    msg.style.color='#E53935';msg.textContent='Only one monthly discount allowed';return;
  }
  activePromos.push({code:code,promo:promo});
  msg.style.color='#34C759';msg.textContent='Applied!';
  document.getElementById(inputId).value='';
  setTimeout(function(){msg.textContent=''},2000);
  renderAppliedPromos();
  updatePrice();
  if(typeof updatePayPlans==='function') updatePayPlans();
}

function getPayPlanInfo(tots){
  var setup=tots.setup;
  if(payPlan==='pif'||payPlan==='fullpif'||setup<=0) return null;
  var down=payPlan==='split15'?15000:10000;
  var bal=setup-down;
  var feeRate=payPlan==='split10'?0.15:0.05;
  var balWithFee=Math.round(bal*(1+feeRate));
  var installment=Math.ceil(balWithFee/2);
  var planLabel=payPlan==='split15'?'$15K Down — 5% Fee':'$10K Down — 15% Financing';
  return{down:down,installment:installment,planLabel:planLabel,totalWithFee:down+balWithFee};
}

// Compute the $195K Pay-Everything-In-Full price for Accelerator (with promo discounts)
function getFullPifPrice(){
  if(!tier||tier!=='accelerator') return 0;
  var t=TIERS[tier],termMonths=t.termMonths||6;
  var pif=t.payInFull;
  if(hasPromo('setup_free')) pif=pif-(t.setup-500);
  var sp2=getPromo('setup_discount');
  if(sp2) pif=pif-(t.setup-Math.max(500,Math.round(t.setup*(1-sp2.promo.pct/100))));
  var mp2=getPromo('monthly_discount');
  if(mp2) pif=pif-(t.monthly-Math.round(t.monthly*(1-mp2.promo.pct/100)))*termMonths;
  var fp2=getPromo('monthly_flat');
  if(fp2) pif=pif-fp2.promo.amount*termMonths;
  return pif;
}

function goTo(s){
  if(s===2&&!tier) return;
  document.querySelectorAll('.sec').forEach(function(x){x.classList.remove('active')});
  document.getElementById('step'+s).classList.add('active');
  document.querySelectorAll('.pst').forEach(function(ps,i){
    var n=i+1;ps.classList.remove('active','completed');
    if(n===s) ps.classList.add('active');
    else if(n<s){ps.classList.add('completed');ps.querySelector('.pdot').innerHTML='&#10003;'}
    else ps.querySelector('.pdot').textContent=n;
  });
  document.querySelectorAll('.pcon').forEach(function(c,i){if(i<s-1) c.classList.add('completed');else c.classList.remove('completed')});
  document.getElementById('sSI').textContent='Step '+s+' of 3';
  var sb=document.getElementById('sidebar'),mb=document.getElementById('mBar');
  if(s===1){sb.style.display='none';mb.style.display='none'}
  else{if(window.innerWidth>=1024) sb.style.display='block';if(window.innerWidth<1024) mb.style.display='block'}
  step=s;
  if(s===2) buildSum();
  if(s===3){updatePayPlans();setTimeout(initSig,100)}
  window.scrollTo({top:0,behavior:'smooth'});
}

      description:'GrowPro Operator Suite — '+t.name+' — '+bn+' — '+planDesc,
      metadata:{business_name:bn,customer_name:fn+' '+(document.getElementById('lastName').value.trim()),phone:document.getElementById('phone').value.trim(),source:document.getElementById('source').value,tier:t.name,promo_codes:activePromos.map(function(p){return p.code}).join(',')||'none',term:t.term,payment_plan:planDesc,support_upgrades:'none'},
      success_url:window.location.origin+'/operator?success=true',
      cancel_url:window.location.href
    };
    if(payPlan==='fullpif'&&tier==='accelerator'){
      fetchBody.line_items=stripeItems;
      fetchBody.mode='payment';
    } else if(planInfo){
      fetchBody.payment_plan={down_payment_cents:planInfo.down*100,installment_cents:planInfo.installment*100,installment_count:2,interval_days:28,plan_label:planInfo.planLabel};
      fetchBody.line_items=[{name:t.name+' — Monthly',amount_cents:tots.mo*100,recurring:true}];
      fetchBody.mode='subscription';
    } else {
      fetchBody.line_items=stripeItems;
      fetchBody.mode=checkoutMode;
    }
    fetch(STRIPE_API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(fetchBody)
    }).then(function(r){return r.json()}).then(function(d){
      if(d.url){window.location.href=d.url}
      else{payBtn.textContent='Pay Now — '+fmt(firstPay)+' today →';payBtn.style.opacity='1';alert('Error: '+(d.error||'Unknown error'))}
    }).catch(function(err){
      payBtn.textContent='Pay Now — '+fmt(firstPay)+' today →';payBtn.style.opacity='1';
      alert('Connection error. Please try again.');
    });
  };

  document.querySelectorAll('.pst').forEach(function(ps){ps.classList.remove('active');ps.classList.add('completed');ps.querySelector('.pdot').innerHTML='&#10003;'});
  document.querySelectorAll('.pcon').forEach(function(c){c.classList.add('completed')});
}

  document.getElementById('sidebar').style.display='none';
  document.getElementById('mBar').style.display='none';
});

var sigCanvas,sigCtx,sigDrawing=false,sigHasData=false;
function initSig(){
sigCanvas=document.getElementById('sigCanvas');
if(!sigCanvas) return;
sigCtx=sigCanvas.getContext('2d');
var wrap=document.getElementById('sigWrap');
function resize(){
var r=wrap.getBoundingClientRect();
sigCanvas.width=r.width;
sigCanvas.height=150;
sigCtx.strokeStyle='#0D1B2A';
sigCtx.lineWidth=2;
sigCtx.lineCap='round';
sigCtx.lineJoin='round';
}
resize();
window.addEventListener('resize',resize);
function getPos(e){
var r=sigCanvas.getBoundingClientRect();
var t=e.touches?e.touches[0]:e;
return{x:t.clientX-r.left,y:t.clientY-r.top};
}
sigCanvas.addEventListener('mousedown',function(e){sigDrawing=true;var p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)});
sigCanvas.addEventListener('mousemove',function(e){if(!sigDrawing)return;var p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasData=true;document.getElementById('sigPlaceholder').style.display='none'});
sigCanvas.addEventListener('mouseup',function(){sigDrawing=false});
sigCanvas.addEventListener('mouseleave',function(){sigDrawing=false});
sigCanvas.addEventListener('touchstart',function(e){e.preventDefault();sigDrawing=true;var p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)},{passive:false});
sigCanvas.addEventListener('touchmove',function(e){e.preventDefault();if(!sigDrawing)return;var p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasData=true;document.getElementById('sigPlaceholder').style.display='none'},{passive:false});
sigCanvas.addEventListener('touchend',function(){sigDrawing=false});
}
function clearSig(){
if(!sigCanvas)return;
sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
sigHasData=false;
document.getElementById('sigPlaceholder').style.display='block';
}
function getSigData(){
if(!sigHasData)return null;
return sigCanvas.toDataURL('image/png');
}
</script>
