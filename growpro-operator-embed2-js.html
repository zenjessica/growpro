// 4-card model: pif (PIF saves 14%), twopay (no fee), quarterly (5% on full), monthly (15% on full)
function updatePayPlans(){
  if(!tier) return;
  var t=TIERS[tier],tots=calcTotals();
  var setup=tots.setup+treatsTotal(),mo=tots.mo,termMonths=t.termMonths||6;
  var ppSec=document.getElementById('ppSection');
  ppSec.style.display='block';

  var stdTotal=setup+(mo*termMonths);  // Standard 6-month total (base)
  var pifPrice=Math.round(stdTotal*0.86); // 14% savings
  var twoPayHalf=Math.ceil(stdTotal/2);
  var quarterlyTotal=Math.round(stdTotal*1.05);
  var quarterlyEach=Math.ceil(quarterlyTotal/3);
  var monthlyTotal=Math.round(stdTotal*1.15);
  var monthlyMo=Math.ceil((monthlyTotal-setup)/termMonths);

  // Card 1: PAY IN FULL (always shown — generous gold card)
  document.getElementById('ppPifAmt').textContent=fmt(pifPrice);
  document.getElementById('ppPifSave').textContent=fmt(stdTotal-pifPrice);
  document.getElementById('ppPifTotal').textContent='Total: '+fmt(pifPrice);

  // Card 2: TWO PAYMENTS (half today, half in 30 days)
  document.getElementById('ppTwoAmt').textContent=fmt(twoPayHalf);
  document.getElementById('ppTwoSecond').textContent=fmt(twoPayHalf);
  document.getElementById('ppTwoTotal').textContent='Total: '+fmt(stdTotal);

  // Card 3: QUARTERLY (3 payments, 5% fee on full balance)
  document.getElementById('ppQuarterAmt').textContent=fmt(quarterlyEach);
  document.getElementById('ppQuarterRest').textContent=fmt(quarterlyEach);
  document.getElementById('ppQuarterTotal').textContent='Total: '+fmt(quarterlyTotal);

  // Card 4: MONTHLY (setup today + monthly with 15% on full)
  document.getElementById('ppMoAmt').textContent=fmt(setup);
  document.getElementById('ppMoFirst').textContent=fmt(monthlyMo);
  document.getElementById('ppMoToday').textContent=fmt(setup+monthlyMo);
  document.getElementById('ppMoRest').textContent=fmt(monthlyMo);
  document.getElementById('ppMoTotal').textContent=termMonths+'-mo total: '+fmt(monthlyTotal);

  // Migrate any old payPlan values to current model
  if(['split15','split10','fullpif'].indexOf(payPlan)>=0) payPlan='pif';

  // Re-apply selection visual
  document.querySelectorAll('.pp-card').forEach(function(c){c.classList.remove('pp-sel')});
  var sel=document.querySelector('[data-plan="'+payPlan+'"]');
  if(sel) sel.classList.add('pp-sel');
}

// Returns the up-front amount + plan label for the selected plan
function getPayPlanInfo(tots){
  var t=TIERS[tier],termMonths=t.termMonths||6;
  var setup=tots.setup+treatsTotal(),mo=tots.mo;
  var stdTotal=setup+(mo*termMonths);
  if(payPlan==='pif'){
    var pifPrice=Math.round(stdTotal*0.86);
    return{plan:'pif',planLabel:'Pay In Full — Save 14%',today:pifPrice,total:pifPrice,recurring:false};
  }
  if(payPlan==='twopay'){
    var half=Math.ceil(stdTotal/2);
    return{plan:'twopay',planLabel:'Two Payments',today:half,second:half,total:stdTotal,recurring:false};
  }
  if(payPlan==='quarterly'){
    var qTot=Math.round(stdTotal*1.05);
    var qEach=Math.ceil(qTot/3);
    return{plan:'quarterly',planLabel:'Quarterly (3 payments, 5% fee)',today:qEach,each:qEach,total:qTot,recurring:false};
  }
  // monthly
  var mTot=Math.round(stdTotal*1.15);
  var mMo=Math.ceil((mTot-setup)/termMonths);
  return{plan:'monthly',planLabel:'Monthly (15% fee on balance)',today:setup+mMo,setup:setup,monthly:mMo,total:mTot,recurring:true};
}

// Legacy function kept for back-compat (returns PIF price)

  var t=TIERS[tier],termMonths=t.termMonths||6,tots=calcTotals();
  return Math.round((tots.setup+tots.mo*termMonths)*0.86);
}

function goTo(s){
  if(s>=2&&!tier) return;
  document.querySelectorAll('.sec').forEach(function(x){x.classList.remove('active')});
  document.getElementById('step'+s).classList.add('active');
  document.querySelectorAll('.pst').forEach(function(ps,i){
    var n=i+1;ps.classList.remove('active','completed');
    if(n===s) ps.classList.add('active');
    else if(n<s){ps.classList.add('completed');ps.querySelector('.pdot').innerHTML='&#10003;'}
    else ps.querySelector('.pdot').textContent=n;
  });
  document.querySelectorAll('.pcon').forEach(function(c,i){if(i<s-1) c.classList.add('completed');else c.classList.remove('completed')});
  document.getElementById('sSI').textContent='Step '+s+' of 4';
  var sb=document.getElementById('sidebar'),mb=document.getElementById('mBar');
  if(s===1){sb.style.display='none';mb.style.display='none'}
  else{if(window.innerWidth>=1024) sb.style.display='block';if(window.innerWidth<1024) mb.style.display='block'}
  step=s;
  if(s===3) buildSum();
  if(s===4){updatePayPlans();setTimeout(initSig,100)}
  window.scrollTo({top:0,behavior:'smooth'});
  reportHeightToParent();
  // IFRAME-FIT v6 (Apr 27, 2026): ask parent to scroll iframe into view via postMessage ONLY.
  // Do NOT use target=_top anchors — they navigate the parent URL and loop the iframe back to Step 1.
  try{if(window.parent && window.parent!==window){
    window.parent.postMessage({type:'growpro:scrollTop',page:'operator'},'*');
  }}catch(e){}
}

// IFRAME-FIT v5 (Apr 26, 2026): report content height to any parent listener (no fallback inner-scroll trap — eliminates double scrollbar)
function reportHeightToParent(){
  try{
    var h=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight,document.body.offsetHeight,document.documentElement.offsetHeight);
    if(window.parent && window.parent!==window){
      window.parent.postMessage({type:'growpro:resize',page:'operator',height:h},'*');
    }
  }catch(e){}
}
window.addEventListener('load',reportHeightToParent);
window.addEventListener('resize',reportHeightToParent);
if(window.ResizeObserver){try{new ResizeObserver(reportHeightToParent).observe(document.body);}catch(e){}}

function submitForm(){
  var fn=document.getElementById('firstName').value.trim(),em=document.getElementById('email').value.trim(),bn=document.getElementById('bizName').value.trim(),ok=true;
  document.getElementById('firstName').classList.remove('err');document.getElementById('email').classList.remove('err');document.getElementById('bizName').classList.remove('err');
  document.getElementById('fnE').classList.remove('show');document.getElementById('emE').classList.remove('show');document.getElementById('bnE').classList.remove('show');
  if(!fn){document.getElementById('firstName').classList.add('err');document.getElementById('fnE').classList.add('show');ok=false}
  if(!em||em.indexOf('@')===-1||em.indexOf('.')===-1){document.getElementById('email').classList.add('err');document.getElementById('emE').classList.add('show');ok=false}

  if(!sigHasData){document.getElementById('sigErr').classList.add('show');ok=false}else{document.getElementById('sigErr').classList.remove('show')}
  if(!document.getElementById('agreeCheck').checked){document.getElementById('sigErr').classList.add('show');ok=false}

  var t=TIERS[tier],tots=calcTotals();

  if(WEBHOOK_URL&&WEBHOOK_URL!=="YOUR_GHL_WEBHOOK_URL_HERE"){
    fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(e){console.log('Webhook error:',e)});
  } else {console.log('Webhook payload:',JSON.stringify(payload,null,2))}

  document.getElementById('formV').classList.add('hid');
  document.getElementById('confV').classList.remove('hid');
  document.getElementById('sidebar').style.display='none';
  document.getElementById('mBar').style.display='none';

  var ppHtml='<div class="suse" style="background:#FFF8E7;border:1px solid #E8D5B7;border-radius:12px;padding:16px 20px;margin-top:16px"><div class="sust" style="color:#6B4226">Payment Plan: '+planInfo.planLabel+'</div>';

  } else if(payPlan==='quarterly'){
    ppHtml+='<div class="sui"><span>Payment 2 (90 days)</span><span>'+fmt(planInfo.each)+'</span></div>';
    ppHtml+='<div class="sui"><span>Payment 3 (180 days)</span><span>'+fmt(planInfo.each)+'</span></div>';
  } else if(payPlan==='monthly'){
    ppHtml+='<div class="sui"><span>Then 5 monthly payments of</span><span>'+fmt(planInfo.monthly)+'</span></div>';

  ppHtml+='<div class="sui" style="font-weight:700"><span>Total</span><span>'+fmt(planInfo.total)+'</span></div>';
  if(payPlan==='monthly') ppHtml+='<div style="font-size:11px;color:#888;margin-top:8px;font-style:italic">15% financing fee on full balance</div>';

  };

  document.querySelectorAll('.pst').forEach(function(ps){ps.classList.remove('active');ps.classList.add('completed');ps.querySelector('.pdot').innerHTML='&#10003;'});
  document.querySelectorAll('.pcon').forEach(function(c){c.classList.add('completed')});
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('sidebar').style.display='none';
  document.getElementById('mBar').style.display='none';
});

var sigCanvas,sigCtx,sigDrawing=false,sigHasData=false;
function initSig(){
sigCanvas=document.getElementById('sigCanvas');
if(!sigCanvas) return;
sigCtx=sigCanvas.getContext('2d');
var wrap=document.getElementById('sigWrap');
function resize(){
var r=wrap.getBoundingClientRect();
sigCanvas.width=r.width;
sigCanvas.height=150;
sigCtx.strokeStyle='#0D1B2A';
sigCtx.lineWidth=2;
sigCtx.lineCap='round';
sigCtx.lineJoin='round';
}
resize();
window.addEventListener('resize',resize);
function getPos(e){
var r=sigCanvas.getBoundingClientRect();
var t=e.touches?e.touches[0]:e;
return{x:t.clientX-r.left,y:t.clientY-r.top};
}
sigCanvas.addEventListener('mousedown',function(e){sigDrawing=true;var p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)});
sigCanvas.addEventListener('mousemove',function(e){if(!sigDrawing)return;var p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasData=true;document.getElementById('sigPlaceholder').style.display='none'});
sigCanvas.addEventListener('mouseup',function(){sigDrawing=false});
sigCanvas.addEventListener('mouseleave',function(){sigDrawing=false});
sigCanvas.addEventListener('touchstart',function(e){e.preventDefault();sigDrawing=true;var p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)},{passive:false});
sigCanvas.addEventListener('touchmove',function(e){e.preventDefault();if(!sigDrawing)return;var p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasData=true;document.getElementById('sigPlaceholder').style.display='none'},{passive:false});
sigCanvas.addEventListener('touchend',function(){sigDrawing=false});
}
function clearSig(){
if(!sigCanvas)return;
sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
sigHasData=false;
document.getElementById('sigPlaceholder').style.display='block';
}
function getSigData(){
if(!sigHasData)return null;
return sigCanvas.toDataURL('image/png');
}
</script>
