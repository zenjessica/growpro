<!--
  GROWPRO IFRAME AUTO-RESIZE + AUTO-SCROLL SNIPPET v2 (Apr 26, 2026)
  ===================================================================
  PASTE THIS in Webflow:
    Project Settings (gear icon) → Custom Code tab → FOOTER CODE section → Save → Publish
  Replaces any previous version of this snippet (safe to overwrite).

  WHAT IT DOES
  ------------
  1. Auto-resizes any GrowPro iframe to fit its content (listens for "growpro:resize")
  2. Auto-scrolls the parent page to the iframe top when steps advance
     (listens for "growpro:scrollTop") — fixes "lands at the bottom of the page"
  3. Strips the scrolling="no" attribute so a fallback inner scrollbar can never
     appear when the listener IS installed.

  Works for operator.html, launch.html, and marketing.html — one paste covers all.

  SAFETY
  ------
  - Only acts on iframes whose src includes "zenjessica.github.io/growpro"
  - Iframe height hard-capped: min 1500px, max 8000px
  - Self-guarded against double-install
  - No external dependencies, ~1KB
-->
<script>
(function(){
  if (window.__growproResizeInstalled) return;
  window.__growproResizeInstalled = true;

  function isGrowProIframe(ifr){
    return ifr && ifr.src && ifr.src.indexOf('zenjessica.github.io/growpro') !== -1;
  }
  function growproIframes(){
    return Array.prototype.filter.call(document.querySelectorAll('iframe'), isGrowProIframe);
  }

  // On page ready: remove scrolling="no" so the fallback inner scroll never engages
  function stripScrolling(){
    growproIframes().forEach(function(ifr){
      try { ifr.removeAttribute('scrolling'); } catch(e){}
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', stripScrolling);
  } else {
    stripScrolling();
  }

  window.addEventListener('message', function(e){
    var d = e && e.data;
    if (!d || typeof d !== 'object') return;

    // 1) RESIZE: grow iframe to match inner content height
    if (d.type === 'growpro:resize' && typeof d.height === 'number') {
      var h = Math.max(1500, Math.min(8000, d.height + 40));
      growproIframes().forEach(function(ifr){
        ifr.style.height = h + 'px';
      });
      return;
    }

    // 2) SCROLL TOP: bring the iframe top into the viewport (smooth)
    if (d.type === 'growpro:scrollTop') {
      var ifrs = growproIframes();
      // Prefer scrolling the iframe that sent the message; fall back to first match.
      var target = ifrs.find(function(ifr){ return ifr.contentWindow === e.source; }) || ifrs[0];
      if (target && target.scrollIntoView) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      return;
    }
  });
})();
</script>
