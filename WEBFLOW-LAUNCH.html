<!-- GROWPRO LAUNCH PAGE - Paste this into the Webflow Embed block on /launch -->
<style>
  .gp-frame-wrap{position:relative;width:100vw;margin-left:calc(50% - 50vw);min-height:1500px;background:#fff}
  .gp-frame-wrap iframe{width:100%;min-height:1500px;border:0;display:block}
</style>
<div class="gp-frame-wrap">
  <iframe id="gp-launch-iframe" src="https://zenjessica.github.io/growpro/launch.html" allow="payment" loading="eager"></iframe>
</div>
<script>
(function(){
  var base='https://zenjessica.github.io/growpro/launch.html';
  var p=new URLSearchParams(window.location.search).get('pkg');
  var iframe=document.getElementById('gp-launch-iframe');
  if(p&&/^(template|custom|operator)$/.test(p)) iframe.src=base+'?pkg='+p;
})();
</script>
