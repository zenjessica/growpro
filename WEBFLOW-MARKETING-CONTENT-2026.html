<style>
  .gp-frame-wrap{position:relative;width:100vw;margin-left:calc(50% - 50vw);height:calc(100vh - 80px);min-height:900px;background:#fff}
  .gp-frame-wrap iframe{width:100%;height:100%;border:0;display:block}
  @media(max-width:768px){.gp-frame-wrap{height:calc(100vh - 60px);min-height:800px}}
</style>
<div class="gp-frame-wrap">
  <iframe id="gpFrame" loading="eager"></iframe>
</div>
<script>
  /* Dynamic daily cache-bust: append today's date (YYYYMMDD) so the iframe
     always pulls a fresh build. No manual version bumping needed. */
  (function(){
    function p(n){return (n<10?'0':'')+n;}
    var d=new Date();
    var v=''+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate());
    document.getElementById('gpFrame').src='https://zenjessica.github.io/growpro/marketing-content-2026.html?v='+v;
  })();
</script>
