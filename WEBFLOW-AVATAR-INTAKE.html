<!--
  Webflow Embed snippet for the AI Avatar Intake form
  Page slug: /avatar-intake  →  https://launch.kickstartsocial.co/avatar-intake
  Source: https://zenjessica.github.io/growpro/intake.html

  v2 — fixes mobile scroll lockup with dynamic iframe height.
-->
<style>
  html, body { margin:0 !important; padding:0 !important; overflow:auto !important; height:auto !important; }
  body > div, body > main, body > section { padding:0 !important; margin:0 !important; }
  iframe#intake-frame { width:100%; border:0; display:block; min-height:100vh; }
</style>
<iframe id="intake-frame"
        src="https://zenjessica.github.io/growpro/intake.html"
        scrolling="yes"
        allow="clipboard-write"></iframe>
<script>
(function(){
  var f = document.getElementById('intake-frame');
  window.addEventListener('message', function(e){
    if(!e.data || typeof e.data!=='object') return;
    if(e.data.type==='resizeIntakeFrame' && e.data.height){
      f.style.height = (parseInt(e.data.height,10)+50) + 'px';
    }
  });
  function tick(){
    try{
      var h = f.contentWindow.document.body.scrollHeight;
      if(h && Math.abs(parseInt(f.style.height||0,10)-h)>20){
        f.style.height = (h+50)+'px';
      }
    }catch(e){}
  }
  setInterval(tick, 800);
  f.style.height = '3500px';
})();
</script>
