function togTreat(card){

function togAddon(card){

function calcTotals(){
var ot=0,mo=0;
if(pkg){
ot+=pkgPrices[pkg];
}
treats.forEach(function(t){
if(pkg==='operator'&&operatorIncludesTreat.indexOf(t)!==-1) return;

});
addons.forEach(function(a){

if(pkg==='operator'&&operatorIncludes.indexOf(a)!==-1) return;
var card=$1('[data-addon="'+a+'"]');
if(!card) return;
var price=parseInt(card.dataset.price),type=card.dataset.type;
if(type==='monthly') mo+=price;

});

}

// IFRAME-FIT (Apr 25, 2026): broadcast content height to parent so a Webflow site-wide listener can auto-resize the iframe.
function reportHeightToParent(){
  try{
    var h=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight,document.body.offsetHeight,document.documentElement.offsetHeight);
    if(window.parent && window.parent!==window){
      window.parent.postMessage({type:'growpro:resize',page:'launch',height:h},'*');
    }
  }catch(e){}
}
window.addEventListener('load',reportHeightToParent);
window.addEventListener('resize',reportHeightToParent);
if(window.ResizeObserver){try{new ResizeObserver(reportHeightToParent).observe(document.body);}catch(e){}}

function updatePayPlans(){
var t=calcTotals();
var ot=t.ot,mo=t.mo;
var ppSec=$i('ppSection');
// Show payment plan for any build with setup >= 15000 (template, custom, operator)
if(!pkg||ot<15000){ppSec.style.display='none';payPlan='pif';return}
ppSec.style.display='block';

// Card 1: Pay Build in Full
$i('ppPifAmt').textContent=fmt(ot);
if($i('ppPifMo')) $i('ppPifMo').textContent=fmt(mo);
if($i('ppPifToday')) $i('ppPifToday').textContent=fmt(ot);
$i('ppPifTotal').textContent='Build total: '+fmt(ot);

// Card 2: $15K Down
var c15=$1('[data-plan="split15"]');
if(ot>15000){
  if(c15) c15.classList.remove('hid');
  var bal15=ot-15000;
  var bal15Fee=Math.round(bal15*1.05);
  var inst15=Math.ceil(bal15Fee/2);

  if($i('ppS15Mo')) $i('ppS15Mo').textContent=fmt(mo);
  if($i('ppS15Today')) $i('ppS15Today').textContent=fmt(15000);
  $i('ppSplit15Total').textContent='Build total: '+fmt(15000+bal15Fee);
} else { if(c15) c15.classList.add('hid'); if(payPlan==='split15') payPlan='pif'; }

// Card 3: $10K Down
var c10=$1('[data-plan="split10"]');
if(ot>10000){
  if(c10) c10.classList.remove('hid');
  var bal10=ot-10000;
  var bal10Fee=Math.round(bal10*1.15);
  var inst10=Math.ceil(bal10Fee/2);
  $i('ppSplit10Amt').textContent='$'+inst10.toLocaleString();
  if($i('ppS10Mo')) $i('ppS10Mo').textContent=fmt(mo);
  if($i('ppS10Today')) $i('ppS10Today').textContent=fmt(10000);
  $i('ppSplit10Total').textContent='Build total: '+fmt(10000+bal10Fee);
} else { if(c10) c10.classList.add('hid'); if(payPlan==='split10') payPlan='pif'; }

// Re-apply selection visual
document.querySelectorAll('.pp-card').forEach(function(c){c.classList.remove('pp-sel')});

if(sel) sel.classList.add('pp-sel');

function getStripeItemsForPlan(t,em,fn,bn){
var ot=t.ot;
if(payPlan==='pif'||!pkg||ot<15000){
return null; // use default logic (PIF) for small builds or no package
}
var down=payPlan==='split15'?15000:10000;
var bal=ot-down;
var feeRate=payPlan==='split10'?0.15:0.05;
var balWithFee=Math.round(bal*(1+feeRate));
var installment=Math.ceil(balWithFee/2);
var planLabel=payPlan==='split15'?'$15K Down, 5% Fee':'$10K Down, 15% Financing';
var items=[
{name:pkgNames[pkg]+': Down Payment ('+planLabel+')',amount_cents:down*100,recurring:false}
];
items.push({name:pkgNames[pkg]+': Installment ('+planLabel+')',amount_cents:installment*100,recurring:true});
return{items:items,mode:'subscription',installment:installment,down:down,planLabel:planLabel,totalWithFee:down+balWithFee,trialDays:28};
}

var sigCanvas,sigCtx,sigDrawing=false,sigHasData=false;
function initSig(){
sigCanvas=$i('sigCanvas');
if(!sigCanvas) return;
sigCtx=sigCanvas.getContext('2d');
var wrap=$i('sigWrap');
function resize(){
var r=wrap.getBoundingClientRect();
sigCanvas.width=r.width;
sigCanvas.height=150;
sigCtx.strokeStyle='#0D1B2A';
sigCtx.lineWidth=2;
sigCtx.lineCap='round';
sigCtx.lineJoin='round';
}
resize();
window.addEventListener('resize',resize);
function getPos(e){
var r=sigCanvas.getBoundingClientRect();
var t=e.touches?e.touches[0]:e;
return{x:t.clientX-r.left,y:t.clientY-r.top};
}
sigCanvas.addEventListener('mousedown',function(e){sigDrawing=true;var p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)});
sigCanvas.addEventListener('mousemove',function(e){if(!sigDrawing)return;var p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasData=true;$i('sigPlaceholder').style.display='none'});
sigCanvas.addEventListener('mouseup',function(){sigDrawing=false});
sigCanvas.addEventListener('mouseleave',function(){sigDrawing=false});
sigCanvas.addEventListener('touchstart',function(e){e.preventDefault();sigDrawing=true;var p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)},{passive:false});
sigCanvas.addEventListener('touchmove',function(e){e.preventDefault();if(!sigDrawing)return;var p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasData=true;$i('sigPlaceholder').style.display='none'},{passive:false});
sigCanvas.addEventListener('touchend',function(){sigDrawing=false});
}
function clearSig(){
if(!sigCanvas)return;
sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
sigHasData=false;
$i('sigPlaceholder').style.display='block';
}
function getSigData(){
if(!sigHasData)return null;
return sigCanvas.toDataURL('image/png');
}
</script>
